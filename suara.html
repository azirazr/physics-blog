<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelombang Suara</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f8ff;
    text-align:center;
}

h1{
    color:#1e3a8a;
    margin-top:20px;
}

.container{
    width:100%;
    height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
}

svg{
    width:90%;
    max-width:1000px;
}

.wave{
    fill:none;
    stroke:#2563eb;
    stroke-width:4;
    stroke-linecap:round;
    stroke-dasharray:12 12;
    animation:moveWave 2s linear infinite;
}

@keyframes moveWave{
    from{
        stroke-dashoffset:0;
    }
    to{
        stroke-dashoffset:-48;
    }
}

.label{
    font-size:22px;
    fill:#111827;
    font-weight:bold;
}

.info{
    width:80%;
    margin:auto;
    margin-bottom:30px;
    font-size:18px;
    line-height:1.7;
}
</style>

</head>
<body>

<h1>🔊 Gelombang Suara</h1>

<div class="container">

<svg viewBox="0 0 1000 500">

<!-- Speaker -->
<rect x="80" y="150"
      width="170"
      height="200"
      rx="20"
      fill="#374151"/>

<circle cx="165"
        cy="250"
        r="70"
        fill="#6b7280"/>

<circle cx="165"
        cy="250"
        r="45"
        fill="#111827"/>

<text x="110"
      y="390"
      class="label">
Speaker
</text>

<!-- Gelombang Atas -->
<path class="wave"
d="M280 250
Q320 180 360 250
T440 250
T520 250
T600 250
T680 250
T760 250
T840 250"/>

<!-- Gelombang Bawah -->
<path class="wave"
d="M280 250
Q320 320 360 250
T440 250
T520 250
T600 250
T680 250
T760 250
T840 250"/>

<text x="500"
      y="120"
      class="label">
Gelombang Suara
</text>

</svg>

</div>

<div class="info">
Suara merupakan getaran yang merambat melalui udara.
Gelombang suara dipancarkan oleh speaker dan bergerak menuju pendengar.
Semakin tinggi frekuensi gelombang, semakin tinggi nada yang terdengar.
</div>

</body>
</html>
