<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rangkaian Listrik Sederhana</title>
</head>
<body>

<svg width="900" height="500" viewBox="0 0 900 500">

  <!-- Baterai -->
  <rect x="80" y="180" width="30" height="100" fill="#444"/>
  <rect x="120" y="160" width="30" height="140" fill="#444"/>

  <text x="85" y="150" font-size="24">+</text>
  <text x="125" y="330" font-size="24">-</text>

  <!-- Kabel -->
  <path d="M135 180 H450" stroke="#222" stroke-width="8" fill="none"/>
  <path d="M450 280 H135" stroke="#222" stroke-width="8" fill="none"/>

  <!-- Lampu -->
  <circle cx="450" cy="230" r="50"
          fill="#ffe44d"
          stroke="#333"
          stroke-width="4">

      <animate attributeName="fill"
               values="#ffe44d;#fff9a0;#ffe44d"
               dur="1.5s"
               repeatCount="indefinite"/>
  </circle>

  <!-- Filamen -->
  <path d="M425 230
           Q438 210 450 230
           Q462 250 475 230"
        stroke="#333"
        stroke-width="4"
        fill="none"/>

  <!-- Cahaya -->
  <g stroke="#FFD700" stroke-width="4">
      <line x1="450" y1="150" x2="450" y2="110"/>
      <line x1="450" y1="350" x2="450" y2="310"/>
      <line x1="370" y1="230" x2="330" y2="230"/>
      <line x1="570" y1="230" x2="530" y2="230"/>
      <line x1="395" y1="175" x2="365" y2="145"/>
      <line x1="505" y1="175" x2="535" y2="145"/>
      <line x1="395" y1="285" x2="365" y2="315"/>
      <line x1="505" y1="285" x2="535" y2="315"/>
  </g>

  <!-- Arus listrik bergerak -->
  <circle r="8" fill="red">
      <animateMotion
          dur="4s"
          repeatCount="indefinite"
          path="M135 180 H450 V280 H135 V180"/>
  </circle>

  <!-- Label -->
  <text x="320" y="420"
        font-size="28"
        font-family="Arial"
        font-weight="bold">
        Rangkaian Listrik Sederhana
  </text>

</svg>

</body>
</html>
